# Magnet pocket generator configuration
magnet:
  radial_mm: 20.0
  tangential_mm: 10.0
  axial_mm: 5.0
  edge_radius_axial_mm: 0.5
  edge_radius_other_mm: 0.2
# These are the frame specs.
holder:
  material: PETG
  magnet_count: 26
  ID_mm: 101.6
  thickness_mm: 8.0
  end_face_mm: 2.0
  clearance_mm: 0.1  # Each side will half of this clearance.
  bore_snap_mm: 0.15  # Radial inward lip that clips over the magnet's edge radius.
# This is the comb of snaps, which interleave with adjacent cell.
comb:
  count: 3
  thickness_mm: 2.0
  axial_gap: 0.5  # gap between snaps, along axial direction
  clearance_mm: 0.1
  snap_overhang_mm: 0.2
  snap_type: full  # full | edges | corners