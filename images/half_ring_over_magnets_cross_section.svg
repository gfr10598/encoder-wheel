<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300.0mm" height="170.0mm" viewBox="0 0 300.0 170.0">
  <title>10 in half-ring cover — radial cross section</title>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#555"/>
    </marker>
    <style>
      .dim { stroke: #555; stroke-width: 0.5; marker-start: url(#arr2); marker-end: url(#arr); }
      .callout { stroke: #555; stroke-width: 0.4; fill: none; marker-end: url(#arr); }
      .text { font-family: sans-serif; fill: #333; }
      .label { font-family: sans-serif; fill: #222; font-size: 4px; font-weight: bold; }
      .note { font-family: sans-serif; fill: #555; font-size: 2.8px; }
    </style>
  </defs>
  <rect width="300.0" height="170.0" fill="white"/>
  <text x="8" y="9" class="label">Half-ring cover — radial cross section (base at top, walls hang down)</text>
  <text x="8" y="14.5" class="note">True scale — gray: printed cover; dark gray: 1/8 in steel ring (reference); blue: 20×2 mm magnets. ID 5.750 in / OD 8.250 in.</text>
  <line x1="36.00" y1="31.00" x2="258.25" y2="31.00" class="dim"/>
  <text x="147.12" y="29.00" text-anchor="middle" class="text" font-size="3.1">1.250 in = 31.75 mm radial span</text>
  <rect x="36.00" y="38.00" width="222.25" height="7.00" fill="#d9d9d9" stroke="#666" stroke-width="0.5"/>
  <rect x="36.00" y="45.00" width="22.22" height="29.22" fill="#c0c0c0" stroke="#666" stroke-width="0.5"/>
  <rect x="236.03" y="45.00" width="22.22" height="29.22" fill="#c0c0c0" stroke="#666" stroke-width="0.5"/>
  <rect x="77.12" y="45.00" width="140.00" height="14.00" fill="#4a90d9" stroke="#2e6bb0" stroke-width="0.5"/>
  <text x="147.12" y="53.20" text-anchor="middle" font-size="3.0" fill="white" font-family="sans-serif">20×2 mm magnet</text>
  <rect x="58.22" y="59.00" width="177.80" height="22.22" fill="#888" stroke="#555" stroke-width="0.5"/>
  <text x="147.12" y="71.31" text-anchor="middle" font-size="3.0" fill="white" font-family="sans-serif">1/8 in steel ring</text>
  <rect x="58.22" y="74.22" width="1.40" height="1.40" fill="#777" stroke="#555" stroke-width="0.3"/>
  <rect x="234.63" y="74.22" width="1.40" height="1.40" fill="#777" stroke="#555" stroke-width="0.3"/>
  <line x1="18.50" y1="38.00" x2="18.50" y2="45.00" class="dim"/>
  <text x="17.50" y="42.50" text-anchor="end" class="text" font-size="2.8">1.0</text>
  <line x1="15.50" y1="45.00" x2="15.50" y2="74.22" class="dim"/>
  <text x="14.50" y="60.61" text-anchor="end" class="text" font-size="2.8">4.175</text>
  <line x1="36.00" y1="83.22" x2="58.22" y2="83.22" class="dim"/>
  <text x="47.11" y="81.72" text-anchor="middle" class="text" font-size="2.8">3.175 (1/8 in)</text>
  <line x1="58.22" y1="91.22" x2="236.03" y2="91.22" class="dim"/>
  <text x="147.12" y="89.72" text-anchor="middle" class="text" font-size="2.8">25.40 mm (1 in) steel ring</text>
  <line x1="36.00" y1="99.22" x2="258.25" y2="99.22" class="dim"/>
  <text x="147.12" y="97.72" text-anchor="middle" class="text" font-size="2.8">cover: 5.750 in ID to 8.250 in OD</text>
  <path d="M 58.92,75.62 L 29.00,83.62" class="callout"/>
  <text x="25.50" y="85.62" text-anchor="end" class="note">0.2 mm snap on both inner and outer walls</text>
</svg>
