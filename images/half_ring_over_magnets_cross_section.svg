<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300.0mm" height="170.0mm" viewBox="0 0 300.0 170.0">
  <title>10 in half-ring cover — radial cross section</title>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#555"/>
    </marker>
    <style>
      .dim { stroke: #555; stroke-width: 0.5; marker-start: url(#arr2); marker-end: url(#arr); }
      .callout { stroke: #555; stroke-width: 0.4; fill: none; marker-end: url(#arr); }
      .text { font-family: sans-serif; fill: #333; }
      .label { font-family: sans-serif; fill: #222; font-size: 4px; font-weight: bold; }
      .note { font-family: sans-serif; fill: #555; font-size: 2.8px; }
    </style>
  </defs>
  <rect width="300.0" height="170.0" fill="white"/>
  <text x="8" y="9" class="label">Half Ring Over Magnets — radial cross section through one magnet</text>
  <text x="8" y="14.5" class="note">To-scale section (same X/Y scale): printed cover in gray, magnet in blue, steel backing ring in dark gray.</text>
  <rect x="30.000" y="116.600" width="107.950" height="3.400" fill="#d9d9d9" stroke="#666" stroke-width="0.5"/>
  <rect x="43.039" y="109.800" width="6.936" height="6.800" fill="#c7c7c7" stroke="#666" stroke-width="0.4"/>
  <rect x="117.975" y="109.800" width="6.936" height="6.800" fill="#c7c7c7" stroke="#666" stroke-width="0.4"/>
  <rect x="40.795" y="102.405" width="10.795" height="14.195" fill="#a8a8a8" stroke="#666" stroke-width="0.45"/>
  <rect x="116.360" y="102.405" width="10.795" height="14.195" fill="#a8a8a8" stroke="#666" stroke-width="0.45"/>
  <rect x="50.910" y="101.997" width="0.680" height="1.870" fill="#8f8f8f" stroke="#666" stroke-width="0.3"/>
  <rect x="116.360" y="101.997" width="0.680" height="1.870" fill="#8f8f8f" stroke="#666" stroke-width="0.3"/>
  <rect x="49.975" y="109.800" width="68.000" height="6.800" fill="#4a90d9" stroke="#2e6bb0" stroke-width="0.5"/>
  <rect x="40.795" y="99.005" width="86.360" height="10.795" fill="#8a8a8a" stroke="#555" stroke-width="0.5"/>
  <text x="83.975" y="117.960" text-anchor="middle" class="text" font-size="3.1">1.0 mm base, 31.75 mm radial span (5.75 in ID to 8.25 in OD)</text>
  <text x="83.975" y="112.520" text-anchor="middle" font-size="3.2" fill="white" font-family="sans-serif">20×2 mm magnet section</text>
  <text x="83.975" y="104.530" text-anchor="middle" font-size="3.2" fill="white" font-family="sans-serif">1/8 in steel ring</text>
  <line x1="30.000" y1="89.400" x2="137.950" y2="89.400" class="dim"/>
  <text x="83.975" y="87.870" text-anchor="middle" class="text" font-size="3.1">1.250 in radial base span = 31.75 mm</text>
  <line x1="22.520" y1="120.000" x2="22.520" y2="116.600" class="dim"/>
  <text x="20.140" y="117.892" text-anchor="end" class="text" font-size="3.0">1.0</text>
  <line x1="14.360" y1="116.600" x2="14.360" y2="109.800" class="dim"/>
  <text x="11.980" y="112.860" text-anchor="end" class="text" font-size="3.0">2.0</text>
  <line x1="6.200" y1="109.800" x2="6.200" y2="99.005" class="dim"/>
  <text x="3.820" y="103.680" text-anchor="end" class="text" font-size="3.0">3.175</text>
  <line x1="-1.960" y1="116.600" x2="-1.960" y2="102.405" class="dim"/>
